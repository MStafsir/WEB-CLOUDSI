<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGL Fluid — Glassmorphism Water</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#020d1a}
  canvas{position:fixed;top:0;left:0;width:100%;height:100%}
  .ui{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:10;gap:2rem}
  .glass-card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:24px;
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    padding:2.5rem 3rem;
    text-align:center;
    box-shadow:0 8px 32px rgba(0,80,180,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
    max-width:520px;
    width:90%;
  }
  .glass-card h1{
    font-family:'Segoe UI',system-ui,sans-serif;
    font-size:2rem;
    font-weight:300;
    letter-spacing:0.12em;
    color:rgba(255,255,255,0.92);
    text-shadow:0 0 40px rgba(100,200,255,0.5);
    margin-bottom:0.75rem;
  }
  .glass-card p{
    font-family:'Segoe UI',system-ui,sans-serif;
    font-size:0.95rem;
    color:rgba(255,255,255,0.5);
    letter-spacing:0.04em;
    line-height:1.6;
  }
  .glass-pill{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:999px;
    padding:0.6rem 1.8rem;
    display:flex;gap:2rem;
    backdrop-filter:blur(12px);
    pointer-events:all;
  }
  .pill-btn{
    font-family:'Segoe UI',system-ui,sans-serif;
    font-size:0.8rem;
    letter-spacing:0.08em;
    color:rgba(255,255,255,0.6);
    cursor:pointer;
    border:none;background:none;
    padding:0.25rem 0.5rem;
    border-radius:999px;
    transition:color 0.2s, background 0.2s;
    text-transform:uppercase;
  }
  .pill-btn:hover{color:rgba(255,255,255,0.95);background:rgba(255,255,255,0.08)}
  .hint{
    position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
    font-family:'Segoe UI',system-ui,sans-serif;
    font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;
    color:rgba(255,255,255,0.25);pointer-events:none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <div class="glass-card">
    <h1>AQUA GLASS</h1>
    <p>Gerakkan kursor atau sentuh layar untuk berinteraksi dengan simulasi cairan berbasis fisika Navier–Stokes ini.</p>
  </div>
  <div class="glass-pill">
    <button class="pill-btn" onclick="setTheme('ocean')">Ocean</button>
    <button class="pill-btn" onclick="setTheme('aurora')">Aurora</button>
    <button class="pill-btn" onclick="setTheme('lava')">Lava</button>
    <button class="pill-btn" onclick="setTheme('void')">Void</button>
  </div>
</div>
<div class="hint">move cursor · touch to create waves</div>
<script>
'use strict';
const canvas = document.getElementById('c');
const params = {
  SIM_RESOLUTION: 128,
  DYE_RESOLUTION: 1024,
  DENSITY_DISSIPATION: 0.97,
  VELOCITY_DISSIPATION: 0.98,
  PRESSURE: 0.8,
  PRESSURE_ITERATIONS: 20,
  CURL: 30,
  SPLAT_RADIUS: 0.25,
  SPLAT_FORCE: 6000,
  SHADING: true,
  COLORFUL: false,
  PAUSED: false,
  BACK_COLOR: {r:2,g:13,b:26},
};

let THEME = {
  colors: [
    {r:0.0,g:0.5,b:1.0},
    {r:0.0,g:0.8,b:0.9},
    {r:0.1,g:0.3,b:0.8},
    {r:0.0,g:0.9,b:0.7},
    {r:0.2,g:0.6,b:1.0},
  ]
};

function setTheme(name){
  if(name==='ocean'){THEME.colors=[{r:0,g:.5,b:1},{r:0,g:.8,b:.9},{r:.1,g:.3,b:.8},{r:0,g:.9,b:.7},{r:.2,g:.6,b:1}];params.BACK_COLOR={r:2,g:13,b:26}}
  if(name==='aurora'){THEME.colors=[{r:.2,g:1,b:.6},{r:.8,g:.2,b:1},{r:.1,g:.9,b:.8},{r:.6,g:.1,b:.9},{r:.3,g:1,b:.5}];params.BACK_COLOR={r:2,g:8,b:18}}
  if(name==='lava'){THEME.colors=[{r:1,g:.2,b:.0},{r:1,g:.6,b:.0},{r:.9,g:.1,b:.1},{r:1,g:.4,b:.1},{r:.8,g:.0,b:.2}];params.BACK_COLOR={r:20,g:4,b:2}}
  if(name==='void'){THEME.colors=[{r:.5,g:.0,b:1},{r:.8,g:.2,b:.9},{r:.3,g:.0,b:.8},{r:.9,g:.5,b:1},{r:.2,g:.1,b:.6}];params.BACK_COLOR={r:5,g:2,b:15}}
}

function getWebGLContext(canvas){
  const params={alpha:true,depth:false,stencil:false,antialias:false,preserveDrawingBuffer:false};
  let gl=canvas.getContext('webgl2',params);
  const isWebGL2=!!gl;
  if(!isWebGL2) gl=canvas.getContext('webgl',params)||canvas.getContext('experimental-webgl',params);
  let halfFloat,supportLinearFiltering;
  if(isWebGL2){
    gl.getExtension('EXT_color_buffer_float');
    supportLinearFiltering=gl.getExtension('OES_texture_float_linear');
  } else {
    halfFloat=gl.getExtension('OES_texture_half_float');
    supportLinearFiltering=gl.getExtension('OES_texture_half_float_linear');
  }
  gl.clearColor(0,0,0,1);
  const halfFloatTexType=isWebGL2?gl.HALF_FLOAT:(halfFloat?halfFloat.HALF_FLOAT_OES:null);
  let formatRGBA,formatRG,formatR;
  if(isWebGL2){
    formatRGBA=getSupportedFormat(gl,gl.RGBA16F,gl.RGBA,halfFloatTexType);
    formatRG=getSupportedFormat(gl,gl.RG16F,gl.RG,halfFloatTexType);
    formatR=getSupportedFormat(gl,gl.R16F,gl.RED,halfFloatTexType);
  } else {
    formatRGBA=getSupportedFormat(gl,gl.RGBA,gl.RGBA,halfFloatTexType);
    formatRG=getSupportedFormat(gl,gl.RGBA,gl.RGBA,halfFloatTexType);
    formatR=getSupportedFormat(gl,gl.RGBA,gl.RGBA,halfFloatTexType);
  }
  return{gl,ext:{formatRGBA,formatRG,formatR,halfFloatTexType,supportLinearFiltering}};
}

function getSupportedFormat(gl,internalFormat,format,type){
  if(!supportRenderTextureFormat(gl,internalFormat,format,type)){
    switch(internalFormat){
      case gl.R16F: return getSupportedFormat(gl,gl.RG16F,gl.RG,type);
      case gl.RG16F: return getSupportedFormat(gl,gl.RGBA16F,gl.RGBA,type);
      default: return null;
    }
  }
  return{internalFormat,format};
}

function supportRenderTextureFormat(gl,internalFormat,format,type){
  let texture=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,texture);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D,0,internalFormat,4,4,0,format,type,null);
  let fbo=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,texture,0);
  let status=gl.checkFramebufferStatus(gl.FRAMEBUFFER);
  return status==gl.FRAMEBUFFER_COMPLETE;
}

const{gl,ext}=getWebGLContext(canvas);

function compileShader(type,source,keywords){
  source=addKeywords(source,keywords);
  const shader=gl.createShader(type);
  gl.shaderSource(shader,source);
  gl.compileShader(shader);
  if(!gl.getShaderParameter(shader,gl.COMPILE_STATUS)) console.trace(gl.getShaderInfoLog(shader));
  return shader;
}

function addKeywords(source,keywords){
  if(!keywords) return source;
  let keywordsStr='';
  keywords.forEach(k=>{keywordsStr+='#define '+k+'\n'});
  return keywordsStr+source;
}

function createProgram(vertexShader,fragmentShader){
  const prog=gl.createProgram();
  gl.attachShader(prog,vertexShader);
  gl.attachShader(prog,fragmentShader);
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) console.trace(gl.getProgramInfoLog(prog));
  return prog;
}

function getUniforms(program){
  let uniforms={};
  let uniformCount=gl.getProgramParameter(program,gl.ACTIVE_UNIFORMS);
  for(let i=0;i<uniformCount;i++){
    let uniformName=gl.getActiveUniform(program,i).name;
    uniforms[uniformName]=gl.getUniformLocation(program,uniformName);
  }
  return uniforms;
}

class GLProgram{
  constructor(vertexShader,fragmentShader){
    this.uniforms={};
    this.program=createProgram(vertexShader,fragmentShader);
    this.uniforms=getUniforms(this.program);
  }
  bind(){gl.useProgram(this.program)}
}

const baseVertexShaderSrc=`
  precision highp float;
  attribute vec2 aPosition;
  varying vec2 vUv;
  varying vec2 vL;
  varying vec2 vR;
  varying vec2 vT;
  varying vec2 vB;
  uniform vec2 texelSize;
  void main(){
    vUv=aPosition*0.5+0.5;
    vL=vUv-vec2(texelSize.x,0.0);
    vR=vUv+vec2(texelSize.x,0.0);
    vT=vUv+vec2(0.0,texelSize.y);
    vB=vUv-vec2(0.0,texelSize.y);
    gl_Position=vec4(aPosition,0.0,1.0);
  }
`;
const blurVertexShaderSrc=`
  precision highp float;
  attribute vec2 aPosition;
  varying vec2 vUv;
  varying vec2 vL;
  varying vec2 vR;
  uniform vec2 texelSize;
  void main(){
    vUv=aPosition*0.5+0.5;
    vL=vUv-vec2(texelSize.x,0.0);
    vR=vUv+vec2(texelSize.x,0.0);
    gl_Position=vec4(aPosition,0.0,1.0);
  }
`;
const blurShaderSrc=`
  precision mediump float;
  varying vec2 vUv;
  varying vec2 vL;
  varying vec2 vR;
  uniform sampler2D uTexture;
  void main(){
    vec4 sum=texture2D(uTexture,vUv)*0.29411764;
    sum+=texture2D(uTexture,vL)*0.35294117;
    sum+=texture2D(uTexture,vR)*0.35294117;
    gl_FragColor=sum;
  }
`;
const copyShaderSrc=`
  precision mediump float;
  varying vec2 vUv;
  uniform sampler2D uTexture;
  void main(){gl_FragColor=texture2D(uTexture,vUv)}
`;
const clearShaderSrc=`
  precision mediump float;
  varying vec2 vUv;
  uniform sampler2D uTexture;
  uniform float value;
  void main(){gl_FragColor=value*texture2D(uTexture,vUv)}
`;
const colorShaderSrc=`
  precision mediump float;
  uniform vec4 color;
  void main(){gl_FragColor=color}
`;
const checkerboardShaderSrc=`
  precision highp float;
  varying vec2 vUv;
  uniform sampler2D uTexture;
  uniform float aspectRatio;
  #define SCALE 25.0
  void main(){
    vec2 uv=floor(vUv*SCALE*vec2(aspectRatio,1.0));
    float v=mod(uv.x+uv.y,2.0);
    v=v*0.1+0.8;
    gl_FragColor=vec4(vec3(v),1.0);
  }
`;
const displayShaderSrc=`
  precision highp float;
  varying vec2 vUv;
  varying vec2 vL;
  varying vec2 vR;
  varying vec2 vT;
  varying vec2 vB;
  uniform sampler2D uTexture;
  uniform sampler2D uBloom;
  uniform sampler2D uSunrays;
  uniform sampler2D uDithering;
  uniform vec2 ditherScale;
  uniform vec2 texelSize;
  vec3 linearToGamma(vec3 color){
    color=max(color,vec3(0));
    return max(1.055*pow(color,vec3(0.4166667))-0.055,vec3(0));
  }
  void main(){
    vec3 c=texture2D(uTexture,vUv).rgb;
    #ifdef SHADING
      vec3 lc=texture2D(uTexture,vL).rgb;
      vec3 rc=texture2D(uTexture,vR).rgb;
      vec3 tc=texture2D(uTexture,vT).rgb;
      vec3 bc=texture2D(uTexture,vB).rgb;
      float dx=length(rc)-length(lc);
      float dy=length(tc)-length(bc);
      vec3 n=normalize(vec3(dx,dy,length(texelSize)));
      vec3 l=vec3(0.0,0.0,1.0);
      float diffuse=clamp(dot(n,l)+0.7,0.7,1.0);
      c*=diffuse;
    #endif
    float a=max(c.r,max(c.g,c.b));
    gl_FragColor=vec4(c,a);
  }
`;
const splatShaderSrc=`
  precision highp float;
  varying vec2 vUv;
  uniform sampler2D uTarget;
  uniform float aspectRatio;
  uniform vec3 color;
  uniform vec2 point;
  uniform float radius;
  void main(){
    vec2 p=vUv-point.xy;
    p.x*=aspectRatio;
    vec3 splat=exp(-dot(p,p)/(radius))*color;
    vec3 base=texture2D(uTarget,vUv).xyz;
    gl_FragColor=vec4(base+splat,1.0);
  }
`;
const advectionShaderSrc=`
  precision highp float;
  varying vec2 vUv;
  uniform sampler2D uVelocity;
  uniform sampler2D uSource;
  uniform vec2 texelSize;
  uniform vec2 dyeTexelSize;
  uniform float dt;
  uniform float dissipation;
  vec4 bilerp(sampler2D sam,vec2 uv,vec2 tsize){
    vec2 st=uv/tsize-0.5;
    vec2 iuv=floor(st);
    vec2 fuv=fract(st);
    vec4 a=texture2D(sam,(iuv+vec2(0.5,0.5))*tsize);
    vec4 b=texture2D(sam,(iuv+vec2(1.5,0.5))*tsize);
    vec4 c=texture2D(sam,(iuv+vec2(0.5,1.5))*tsize);
    vec4 d=texture2D(sam,(iuv+vec2(1.5,1.5))*tsize);
    return mix(mix(a,b,fuv.x),mix(c,d,fuv.x),fuv.y);
  }
  void main(){
    #ifdef MANUAL_FILTERING
      vec2 coord=vUv-dt*bilerp(uVelocity,vUv,texelSize).xy*texelSize;
      vec4 result=bilerp(uSource,coord,dyeTexelSize);
    #else
      vec2 coord=vUv-dt*texture2D(uVelocity,vUv).xy*texelSize;
      vec4 result=texture2D(uSource,coord);
    #endif
    float decay=1.0+dissipation*dt;
    gl_FragColor=result/decay;
  }
`;
const divergenceShaderSrc=`
  precision mediump float;
  varying highp vec2 vUv;
  varying highp vec2 vL;
  varying highp vec2 vR;
  varying highp vec2 vT;
  varying highp vec2 vB;
  uniform sampler2D uVelocity;
  void main(){
    float L=texture2D(uVelocity,vL).x;
    float R=texture2D(uVelocity,vR).x;
    float T=texture2D(uVelocity,vT).y;
    float B=texture2D(uVelocity,vB).y;
    vec2 C=texture2D(uVelocity,vUv).xy;
    if(vL.x<0.0){L=-C.x}
    if(vR.x>1.0){R=-C.x}
    if(vT.y>1.0){T=-C.y}
    if(vB.y<0.0){B=-C.y}
    float div=0.5*(R-L+T-B);
    gl_FragColor=vec4(div,0.0,0.0,1.0);
  }
`;
const curlShaderSrc=`
  precision mediump float;
  varying highp vec2 vUv;
  varying highp vec2 vL;
  varying highp vec2 vR;
  varying highp vec2 vT;
  varying highp vec2 vB;
  uniform sampler2D uVelocity;
  void main(){
    float L=texture2D(uVelocity,vL).y;
    float R=texture2D(uVelocity,vR).y;
    float T=texture2D(uVelocity,vT).x;
    float B=texture2D(uVelocity,vB).x;
    float vorticity=R-L-T+B;
    gl_FragColor=vec4(0.5*vorticity,0.0,0.0,1.0);
  }
`;
const vorticityShaderSrc=`
  precision highp float;
  varying vec2 vUv;
  varying vec2 vL;
  varying vec2 vR;
  varying vec2 vT;
  varying vec2 vB;
  uniform sampler2D uVelocity;
  uniform sampler2D uCurl;
  uniform float curl;
  uniform float dt;
  void main(){
    float L=texture2D(uCurl,vL).x;
    float R=texture2D(uCurl,vR).x;
    float T=texture2D(uCurl,vT).x;
    float B=texture2D(uCurl,vB).x;
    float C=texture2D(uCurl,vUv).x;
    vec2 force=0.5*vec2(abs(T)-abs(B),abs(R)-abs(L));
    force/=length(force)+0.0001;
    force*=curl*C;
    force.y*=-1.0;
    vec2 v=texture2D(uVelocity,vUv).xy;
    gl_FragColor=vec4(v+force*dt,0.0,1.0);
  }
`;
const pressureShaderSrc=`
  precision mediump float;
  varying highp vec2 vUv;
  varying highp vec2 vL;
  varying highp vec2 vR;
  varying highp vec2 vT;
  varying highp vec2 vB;
  uniform sampler2D uPressure;
  uniform sampler2D uDivergence;
  void main(){
    float L=texture2D(uPressure,vL).x;
    float R=texture2D(uPressure,vR).x;
    float T=texture2D(uPressure,vT).x;
    float B=texture2D(uPressure,vB).x;
    float C=texture2D(uPressure,vUv).x;
    float divergence=texture2D(uDivergence,vUv).x;
    float pressure=(L+R+B+T-divergence)*0.25;
    gl_FragColor=vec4(pressure,0.0,0.0,1.0);
  }
`;
const gradientSubtractShaderSrc=`
  precision mediump float;
  varying highp vec2 vUv;
  varying highp vec2 vL;
  varying highp vec2 vR;
  varying highp vec2 vT;
  varying highp vec2 vB;
  uniform sampler2D uPressure;
  uniform sampler2D uVelocity;
  void main(){
    float L=texture2D(uPressure,vL).x;
    float R=texture2D(uPressure,vR).x;
    float T=texture2D(uPressure,vT).x;
    float B=texture2D(uPressure,vB).x;
    vec2 velocity=texture2D(uVelocity,vUv).xy;
    velocity.xy-=vec2(R-L,T-B);
    gl_FragColor=vec4(velocity,0.0,1.0);
  }
`;

const bVertex=compileShader(gl.VERTEX_SHADER,baseVertexShaderSrc);
const blurVertex=compileShader(gl.VERTEX_SHADER,blurVertexShaderSrc);
const blurProgram=new GLProgram(blurVertex,compileShader(gl.FRAGMENT_SHADER,blurShaderSrc));
const copyProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,copyShaderSrc));
const clearProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,clearShaderSrc));
const colorProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,colorShaderSrc));
const checkerboardProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,checkerboardShaderSrc));
const displayProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,displayShaderSrc,['SHADING']));
const splatProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,splatShaderSrc));
const advectionProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,advectionShaderSrc,ext.supportLinearFiltering?null:['MANUAL_FILTERING']));
const divergenceProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,divergenceShaderSrc));
const curlProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,curlShaderSrc));
const vorticityProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,vorticityShaderSrc));
const pressureProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,pressureShaderSrc));
const gradienSubtractProgram=new GLProgram(bVertex,compileShader(gl.FRAGMENT_SHADER,gradientSubtractShaderSrc));

function createFBO(w,h,internalFormat,format,type,param){
  gl.activeTexture(gl.TEXTURE0);
  let texture=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,texture);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,param);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,param);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D,0,internalFormat,w,h,0,format,type,null);
  let fbo=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,texture,0);
  gl.viewport(0,0,w,h);
  gl.clear(gl.COLOR_BUFFER_BIT);
  let texelSizeX=1.0/w;
  let texelSizeY=1.0/h;
  return{texture,fbo,width:w,height:h,texelSizeX,texelSizeY,
    attach(id){gl.activeTexture(gl.TEXTURE0+id);gl.bindTexture(gl.TEXTURE_2D,this.texture);return id}
  };
}

function createDoubleFBO(w,h,internalFormat,format,type,param){
  let fbo1=createFBO(w,h,internalFormat,format,type,param);
  let fbo2=createFBO(w,h,internalFormat,format,type,param);
  return{
    width:w,height:h,texelSizeX:fbo1.texelSizeX,texelSizeY:fbo1.texelSizeY,
    get read(){return fbo1},
    set read(v){fbo1=v},
    get write(){return fbo2},
    set write(v){fbo2=v},
    swap(){let t=fbo1;fbo1=fbo2;fbo2=t}
  };
}

function resizeFBO(target,w,h,internalFormat,format,type,param){
  let newFBO=createFBO(w,h,internalFormat,format,type,param);
  copyProgram.bind();
  gl.uniform1i(copyProgram.uniforms.uTexture,target.attach(0));
  blit(newFBO);
  return newFBO;
}

function resizeDoubleFBO(target,w,h,internalFormat,format,type,param){
  if(target.width==w&&target.height==h) return target;
  target.read=resizeFBO(target.read,w,h,internalFormat,format,type,param);
  target.write=createFBO(w,h,internalFormat,format,type,param);
  target.width=w;target.height=h;
  target.texelSizeX=1.0/w;target.texelSizeY=1.0/h;
  return target;
}

let dye,velocity,divergence,curl,pressure;
let ditheringTexture=createTextureAsync('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAAAAABX3VLAAAACXBIWXMAAC4jAAAuIwF4pT92AAAAB3RJTUUH5QMKDioqKrOPDAAAABVJREFUCNdj+M/AwMCwgYGBgaGBAQAHkAEBKnMKtQAAAABJRU5ErkJggg==');

function createTextureAsync(url){
  let texture=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,texture);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,1,1,0,gl.RGB,gl.UNSIGNED_BYTE,new Uint8Array([255,255,255]));
  let obj={texture,width:1,height:1,attach(id){gl.activeTexture(gl.TEXTURE0+id);gl.bindTexture(gl.TEXTURE_2D,this.texture);return id}};
  let img=new Image();
  img.onload=()=>{obj.width=img.width;obj.height=img.height;gl.bindTexture(gl.TEXTURE_2D,obj.texture);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,img)};
  img.src=url;
  return obj;
}

function initFramebuffers(){
  let simRes=getResolution(params.SIM_RESOLUTION);
  let dyeRes=getResolution(params.DYE_RESOLUTION);
  const texType=ext.halfFloatTexType;
  const rgba=ext.formatRGBA;
  const rg=ext.formatRG;
  const r=ext.formatR;
  const filtering=ext.supportLinearFiltering?gl.LINEAR:gl.NEAREST;
  if(!dye){
    dye=createDoubleFBO(dyeRes.width,dyeRes.height,rgba.internalFormat,rgba.format,texType,filtering);
  } else {
    dye=resizeDoubleFBO(dye,dyeRes.width,dyeRes.height,rgba.internalFormat,rgba.format,texType,filtering);
  }
  if(!velocity){
    velocity=createDoubleFBO(simRes.width,simRes.height,rg.internalFormat,rg.format,texType,filtering);
  } else {
    velocity=resizeDoubleFBO(velocity,simRes.width,simRes.height,rg.internalFormat,rg.format,texType,filtering);
  }
  divergence=createFBO(simRes.width,simRes.height,r.internalFormat,r.format,texType,gl.NEAREST);
  curl=createFBO(simRes.width,simRes.height,r.internalFormat,r.format,texType,gl.NEAREST);
  pressure=createDoubleFBO(simRes.width,simRes.height,r.internalFormat,r.format,texType,gl.NEAREST);
}

function getResolution(resolution){
  let aspectRatio=gl.drawingBufferWidth/gl.drawingBufferHeight;
  if(aspectRatio<1) aspectRatio=1.0/aspectRatio;
  let min=Math.round(resolution);
  let max=Math.round(resolution*aspectRatio);
  if(gl.drawingBufferWidth>gl.drawingBufferHeight) return{width:max,height:min};
  else return{width:min,height:max};
}

const positionBuffer=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,positionBuffer);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,-1,1,1,1,1,-1]),gl.STATIC_DRAW);
const indexBuffer=gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,indexBuffer);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array([0,1,2,0,2,3]),gl.STATIC_DRAW);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
gl.enableVertexAttribArray(0);

function blit(target,clear=false){
  if(target==null){
    gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight);
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  } else {
    gl.viewport(0,0,target.width,target.height);
    gl.bindFramebuffer(gl.FRAMEBUFFER,target.fbo);
  }
  if(clear){gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT)}
  gl.drawElements(gl.TRIANGLES,6,gl.UNSIGNED_SHORT,0);
}

let lastUpdateTime=Date.now();
let colorUpdateTimer=0;
initFramebuffers();
multipleSplats(parseInt(Math.random()*5)+5);

requestAnimationFrame(update);
function update(){
  const dt=calcDeltaTime();
  if(resizeCanvas()) initFramebuffers();
  updateColors(dt);
  applyInputs();
  if(!params.PAUSED) step(dt);
  render(null);
  requestAnimationFrame(update);
}

function calcDeltaTime(){
  let now=Date.now();
  let dt=(now-lastUpdateTime)/1000;
  dt=Math.min(dt,0.016666);
  lastUpdateTime=now;
  return dt;
}

function resizeCanvas(){
  let w=window.innerWidth;
  let h=window.innerHeight;
  if(canvas.width!=w||canvas.height!=h){
    canvas.width=w;canvas.height=h;return true;
  }
  return false;
}

function updateColors(dt){
  colorUpdateTimer+=dt*8;
  pointers.forEach(p=>{
    if(p.moved){
      p.color=generateColor();
      p.moved=false;
    }
  });
}

function applyInputs(){
  pointers.forEach(p=>{
    if(p.moved){
      splat(p.texcoordX,p.texcoordY,p.deltaX,p.deltaY,p.color);
      p.moved=false;
    }
  });
}

function step(dt){
  gl.disable(gl.BLEND);
  curlProgram.bind();
  gl.uniform2f(curlProgram.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  gl.uniform1i(curlProgram.uniforms.uVelocity,velocity.read.attach(0));
  blit(curl);
  vorticityProgram.bind();
  gl.uniform2f(vorticityProgram.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  gl.uniform1i(vorticityProgram.uniforms.uVelocity,velocity.read.attach(0));
  gl.uniform1i(vorticityProgram.uniforms.uCurl,curl.attach(1));
  gl.uniform1f(vorticityProgram.uniforms.curl,params.CURL);
  gl.uniform1f(vorticityProgram.uniforms.dt,dt);
  blit(velocity.write);
  velocity.swap();
  divergenceProgram.bind();
  gl.uniform2f(divergenceProgram.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  gl.uniform1i(divergenceProgram.uniforms.uVelocity,velocity.read.attach(0));
  blit(divergence);
  clearProgram.bind();
  gl.uniform1i(clearProgram.uniforms.uTexture,pressure.read.attach(0));
  gl.uniform1f(clearProgram.uniforms.value,params.PRESSURE);
  blit(pressure.write);
  pressure.swap();
  pressureProgram.bind();
  gl.uniform2f(pressureProgram.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  gl.uniform1i(pressureProgram.uniforms.uDivergence,divergence.attach(0));
  for(let i=0;i<params.PRESSURE_ITERATIONS;i++){
    gl.uniform1i(pressureProgram.uniforms.uPressure,pressure.read.attach(1));
    blit(pressure.write);
    pressure.swap();
  }
  gradienSubtractProgram.bind();
  gl.uniform2f(gradienSubtractProgram.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  gl.uniform1i(gradienSubtractProgram.uniforms.uPressure,pressure.read.attach(0));
  gl.uniform1i(gradienSubtractProgram.uniforms.uVelocity,velocity.read.attach(1));
  blit(velocity.write);
  velocity.swap();
  advectionProgram.bind();
  gl.uniform2f(advectionProgram.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
  if(!ext.supportLinearFiltering) gl.uniform2f(advectionProgram.uniforms.dyeTexelSize,velocity.texelSizeX,velocity.texelSizeY);
  let velocityId=velocity.read.attach(0);
  gl.uniform1i(advectionProgram.uniforms.uVelocity,velocityId);
  gl.uniform1i(advectionProgram.uniforms.uSource,velocityId);
  gl.uniform1f(advectionProgram.uniforms.dt,dt);
  gl.uniform1f(advectionProgram.uniforms.dissipation,params.VELOCITY_DISSIPATION);
  blit(velocity.write);
  velocity.swap();
  if(!ext.supportLinearFiltering) gl.uniform2f(advectionProgram.uniforms.dyeTexelSize,dye.texelSizeX,dye.texelSizeY);
  gl.uniform1i(advectionProgram.uniforms.uVelocity,velocity.read.attach(0));
  gl.uniform1i(advectionProgram.uniforms.uSource,dye.read.attach(1));
  gl.uniform1f(advectionProgram.uniforms.dissipation,params.DENSITY_DISSIPATION);
  blit(dye.write);
  dye.swap();
}

function render(target){
  gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
  gl.enable(gl.BLEND);
  drawColor(target,normalizeColor(params.BACK_COLOR));
  drawDisplay(target);
}

function drawColor(target,color){
  colorProgram.bind();
  gl.uniform4f(colorProgram.uniforms.color,color.r,color.g,color.b,1);
  blit(target);
}

function drawDisplay(target){
  let w=target==null?gl.drawingBufferWidth:target.width;
  let h=target==null?gl.drawingBufferHeight:target.height;
  displayProgram.bind();
  gl.uniform2f(displayProgram.uniforms.texelSize,1.0/w,1.0/h);
  gl.uniform1i(displayProgram.uniforms.uTexture,dye.read.attach(0));
  gl.uniform1i(displayProgram.uniforms.uDithering,ditheringTexture.attach(1));
  gl.uniform2f(displayProgram.uniforms.ditherScale,w/ditheringTexture.width,h/ditheringTexture.height);
  blit(target);
}

function splat(x,y,dx,dy,color){
  splatProgram.bind();
  gl.uniform1i(splatProgram.uniforms.uTarget,velocity.read.attach(0));
  gl.uniform1f(splatProgram.uniforms.aspectRatio,canvas.width/canvas.height);
  gl.uniform2f(splatProgram.uniforms.point,x,y);
  gl.uniform3f(splatProgram.uniforms.color,dx,dy,0);
  gl.uniform1f(splatProgram.uniforms.radius,correctRadius(params.SPLAT_RADIUS/100.0));
  blit(velocity.write);
  velocity.swap();
  gl.uniform1i(splatProgram.uniforms.uTarget,dye.read.attach(0));
  gl.uniform3f(splatProgram.uniforms.color,color.r,color.g,color.b);
  blit(dye.write);
  dye.swap();
}

function correctRadius(radius){
  let aspectRatio=canvas.width/canvas.height;
  if(aspectRatio>1) radius*=aspectRatio;
  return radius;
}

function multipleSplats(amount){
  for(let i=0;i<amount;i++){
    const color=generateColor();
    color.r*=10;color.g*=10;color.b*=10;
    const x=Math.random();
    const y=Math.random();
    const dx=1000*(Math.random()-0.5);
    const dy=1000*(Math.random()-0.5);
    splat(x,y,dx,dy,color);
  }
}

function generateColor(){
  const colors=THEME.colors;
  const c=colors[Math.floor(Math.random()*colors.length)];
  return{r:c.r,g:c.g,b:c.b};
}

function normalizeColor(input){
  return{r:input.r/255,g:input.g/255,b:input.b/255};
}

let pointers=[{id:-1,texcoordX:0,texcoordY:0,prevTexcoordX:0,prevTexcoordY:0,deltaX:0,deltaY:0,down:false,moved:false,color:generateColor()}];

canvas.addEventListener('mousemove',e=>{
  let p=pointers[0];
  p.prevTexcoordX=p.texcoordX;p.prevTexcoordY=p.texcoordY;
  p.texcoordX=e.clientX/canvas.width;p.texcoordY=1-e.clientY/canvas.height;
  p.deltaX=correctDeltaX(p.texcoordX-p.prevTexcoordX);
  p.deltaY=correctDeltaY(p.texcoordY-p.prevTexcoordY);
  p.moved=Math.abs(p.deltaX)>0||Math.abs(p.deltaY)>0;
});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const touches=e.targetTouches;
  while(pointers.length>touches.length) pointers.splice(-1,1);
  for(let i=0;i<touches.length;i++){
    let p;
    if(i>=pointers.length){p={id:touches[i].identifier,texcoordX:0,texcoordY:0,prevTexcoordX:0,prevTexcoordY:0,deltaX:0,deltaY:0,down:false,moved:false,color:generateColor()};pointers.push(p)}
    else p=pointers[i];
    p.prevTexcoordX=p.texcoordX;p.prevTexcoordY=p.texcoordY;
    p.texcoordX=touches[i].clientX/canvas.width;p.texcoordY=1-touches[i].clientY/canvas.height;
    p.deltaX=correctDeltaX(p.texcoordX-p.prevTexcoordX)*8;
    p.deltaY=correctDeltaY(p.texcoordY-p.prevTexcoordY)*8;
    p.moved=Math.abs(p.deltaX)>0||Math.abs(p.deltaY)>0;
  }
},{passive:false});

function correctDeltaX(delta){return canvas.width>canvas.height?delta*canvas.width/canvas.height:delta}
function correctDeltaY(delta){return canvas.height>canvas.width?delta*canvas.height/canvas.width:delta}

window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();params.PAUSED=!params.PAUSED}});
</script>
